server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

app:
  init:
    enabled: true
    admin:
      email: ${ADMIN_EMAIL}
      password: ${ADMIN_PASSWORD}
  security:
    public-endpoints:
      "/api/v1/auth/login, 
      /api/v1/auth/register, 
      /api/v1/auth/activate, 
      /api/v1/auth/forgot-password, 
      /api/v1/auth/reset-password, 
      /api/v1/auth/refresh-token"
    jwt:
      access-token-secret-key: ${JWT_ACCESS_SECRET_KEY}
      refresh-token-secret-key: ${JWT_REFRESH_SECRET_KEY}
      access-token-expiration: 3600 # 1 hour
      refresh-token-expiration: 2592000 # 30 days
