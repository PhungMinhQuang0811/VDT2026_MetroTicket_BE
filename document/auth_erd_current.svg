<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620">
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 8; }
    .head { fill: #e0f2fe; stroke: #334155; stroke-width: 1.5; }
    .title { font: 700 16px Arial, sans-serif; fill: #0f172a; }
    .text { font: 13px Arial, sans-serif; fill: #1e293b; }
    .key { font: 700 13px Arial, sans-serif; fill: #0f172a; }
    .rel { stroke: #475569; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    .note { font: 12px Arial, sans-serif; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="620"/>
  <text class="title" x="40" y="36">auth_db ERD - identity-service</text>
  <text class="note" x="40" y="58">Profile fields are embedded in accounts. Wallets are separate ledger objects with one wallet per account/type.</text>

  <g transform="translate(40,95)">
    <rect class="box" width="260" height="335"/>
    <rect class="head" width="260" height="36"/>
    <text class="title" x="16" y="24">accounts</text>
    <text class="key" x="16" y="64">PK id</text>
    <text class="text" x="16" y="88">username UK</text>
    <text class="text" x="16" y="112">password</text>
    <text class="text" x="16" y="136">email UK</text>
    <text class="text" x="16" y="160">phone_number UK</text>
    <text class="text" x="16" y="184">full_name</text>
    <text class="text" x="16" y="208">avatar_url</text>
    <text class="text" x="16" y="232">address</text>
    <text class="text" x="16" y="256">personal_id</text>
    <text class="text" x="16" y="280">is_active / verified flags</text>
    <text class="text" x="16" y="304">created_at / updated_at</text>
  </g>

  <g transform="translate(430,95)">
    <rect class="box" width="260" height="220"/>
    <rect class="head" width="260" height="36"/>
    <text class="title" x="16" y="24">wallets</text>
    <text class="key" x="16" y="64">PK wallet_id</text>
    <text class="key" x="16" y="88">FK account_id</text>
    <text class="text" x="16" y="112">wallet_type</text>
    <text class="text" x="16" y="136">balance</text>
    <text class="text" x="16" y="160">status</text>
    <text class="text" x="16" y="184">created_at / updated_at</text>
    <text class="text" x="16" y="208">UK account_id + wallet_type</text>
  </g>

  <g transform="translate(430,385)">
    <rect class="box" width="260" height="150"/>
    <rect class="head" width="260" height="36"/>
    <text class="title" x="16" y="24">account_roles</text>
    <text class="key" x="16" y="64">PK, FK account_id</text>
    <text class="key" x="16" y="88">PK, FK role_id</text>
  </g>

  <g transform="translate(820,215)">
    <rect class="box" width="260" height="180"/>
    <rect class="head" width="260" height="36"/>
    <text class="title" x="16" y="24">roles</text>
    <text class="key" x="16" y="64">PK id</text>
    <text class="text" x="16" y="88">name UK</text>
    <text class="text" x="16" y="112">description</text>
    <text class="text" x="16" y="136">created_at / updated_at</text>
  </g>

  <g transform="translate(820,455)">
    <rect class="box" width="260" height="125"/>
    <rect class="head" width="260" height="36"/>
    <text class="title" x="16" y="24">role_permissions</text>
    <text class="key" x="16" y="64">PK, FK role_id</text>
    <text class="key" x="16" y="88">PK, FK permission_id</text>
  </g>

  <g transform="translate(430,25)">
    <rect class="box" width="260" height="75"/>
    <rect class="head" width="260" height="28"/>
    <text class="title" x="16" y="20">permissions</text>
    <text class="key" x="16" y="47">PK id, name UK</text>
    <text class="text" x="16" y="67">description, timestamps</text>
  </g>

  <path class="rel" d="M300 180 C345 180, 385 180, 430 180"/>
  <path class="rel" d="M300 360 C345 430, 385 455, 430 455"/>
  <path class="rel" d="M690 460 C735 370, 775 310, 820 300"/>
  <path class="rel" d="M950 395 C950 420, 950 435, 950 455"/>
  <path class="rel" d="M820 515 C760 515, 735 75, 690 55"/>
</svg>
