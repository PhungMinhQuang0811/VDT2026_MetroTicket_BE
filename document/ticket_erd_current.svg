<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 8; }
    .head { fill: #dcfce7; stroke: #334155; stroke-width: 1.4; }
    .finance .head { fill: #fef3c7; }
    .ops .head { fill: #dbeafe; }
    .title { font: 700 15px Arial, sans-serif; fill: #0f172a; }
    .text { font: 12px Arial, sans-serif; fill: #1e293b; }
    .key { font: 700 12px Arial, sans-serif; fill: #0f172a; }
    .rel { stroke: #475569; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    .logical { stroke: #9333ea; stroke-width: 1.4; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrowPurple); }
    .note { font: 12px Arial, sans-serif; fill: #475569; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9333ea" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1600" height="1120"/>
  <text class="title" x="40" y="36">ticket_db ERD - ticket-service</text>
  <text class="note" x="40" y="58">Purple dashed lines are logical references to auth_db accounts/wallets, not physical cross-database foreign keys.</text>

  <g class="ops" transform="translate(50,95)">
    <rect class="box" width="230" height="130"/>
    <rect class="head" width="230" height="34"/>
    <text class="title" x="14" y="23">operators</text>
    <text class="key" x="14" y="58">PK operator_id INT</text>
    <text class="text" x="14" y="82">operator_name</text>
    <text class="text" x="14" y="106">contact_email</text>
  </g>

  <g class="ops" transform="translate(360,80)">
    <rect class="box" width="230" height="150"/>
    <rect class="head" width="230" height="34"/>
    <text class="title" x="14" y="23">routes</text>
    <text class="key" x="14" y="58">PK route_id INT</text>
    <text class="key" x="14" y="82">FK operator_id INT</text>
    <text class="text" x="14" y="106">route_name</text>
    <text class="text" x="14" y="130">transport_type, route_code</text>
  </g>

  <g class="ops" transform="translate(690,80)">
    <rect class="box" width="230" height="160"/>
    <rect class="head" width="230" height="34"/>
    <text class="title" x="14" y="23">stations</text>
    <text class="key" x="14" y="58">PK station_id INT</text>
    <text class="key" x="14" y="82">FK route_id INT</text>
    <text class="text" x="14" y="106">station_name</text>
    <text class="text" x="14" y="130">station_order</text>
    <text class="text" x="14" y="154">latitude, longitude</text>
  </g>

  <g transform="translate(50,355)">
    <rect class="box" width="250" height="195"/>
    <rect class="head" width="250" height="34"/>
    <text class="title" x="14" y="23">cards</text>
    <text class="key" x="14" y="58">PK card_id</text>
    <text class="text" x="14" y="82">card_uid</text>
    <text class="text" x="14" y="106">owner_id logical</text>
    <text class="text" x="14" y="130">card_medium, card_type</text>
    <text class="text" x="14" y="154">status, created_by logical</text>
    <text class="text" x="14" y="178">issued_at, qr_secret_key/config</text>
  </g>

  <g transform="translate(360,330)">
    <rect class="box" width="250" height="210"/>
    <rect class="head" width="250" height="34"/>
    <text class="title" x="14" y="23">subscriptions</text>
    <text class="key" x="14" y="58">PK subscription_id</text>
    <text class="key" x="14" y="82">FK card_id</text>
    <text class="key" x="14" y="106">FK route_id INT nullable</text>
    <text class="text" x="14" y="130">package_code/name</text>
    <text class="text" x="14" y="154">start_date, end_date</text>
    <text class="text" x="14" y="178">price, payment_status</text>
    <text class="text" x="14" y="202">status</text>
  </g>

  <g transform="translate(690,315)">
    <rect class="box" width="260" height="235"/>
    <rect class="head" width="260" height="34"/>
    <text class="title" x="14" y="23">tickets</text>
    <text class="key" x="14" y="58">PK ticket_id</text>
    <text class="key" x="14" y="82">FK card_id</text>
    <text class="key" x="14" y="106">FK route_id INT</text>
    <text class="key" x="14" y="130">FK entry_station_id INT</text>
    <text class="key" x="14" y="154">FK exit_station_id INT</text>
    <text class="text" x="14" y="178">price, payment_method</text>
    <text class="text" x="14" y="202">payment_status, status</text>
    <text class="text" x="14" y="226">created_at, updated_at</text>
  </g>

  <g transform="translate(50,660)">
    <rect class="box" width="260" height="245"/>
    <rect class="head" width="260" height="34"/>
    <text class="title" x="14" y="23">orders</text>
    <text class="key" x="14" y="58">PK order_id</text>
    <text class="text" x="14" y="82">user_id logical</text>
    <text class="key" x="14" y="106">FK route_id INT nullable</text>
    <text class="key" x="14" y="130">FK card_id nullable</text>
    <text class="text" x="14" y="154">customer profile fields</text>
    <text class="text" x="14" y="178">shipping fields</text>
    <text class="text" x="14" y="202">total_amount, payment_status</text>
    <text class="text" x="14" y="226">order_status</text>
  </g>

  <g class="ops" transform="translate(1050,70)">
    <rect class="box" width="240" height="150"/>
    <rect class="head" width="240" height="34"/>
    <text class="title" x="14" y="23">staff_shifts</text>
    <text class="key" x="14" y="58">PK shift_id</text>
    <text class="text" x="14" y="82">staff_id logical</text>
    <text class="key" x="14" y="106">FK station_id INT</text>
    <text class="text" x="14" y="130">started_at, ended_at, status</text>
  </g>

  <g transform="translate(1030,330)">
    <rect class="box" width="255" height="210"/>
    <rect class="head" width="255" height="34"/>
    <text class="title" x="14" y="23">journeys</text>
    <text class="key" x="14" y="58">PK journey_id</text>
    <text class="key" x="14" y="82">FK card_id</text>
    <text class="key" x="14" y="106">FK ticket_id nullable</text>
    <text class="key" x="14" y="130">FK entry_station_id INT</text>
    <text class="key" x="14" y="154">FK exit_station_id INT</text>
    <text class="text" x="14" y="178">fare_amount, status</text>
    <text class="text" x="14" y="202">processed_status</text>
  </g>

  <g class="finance" transform="translate(1030,650)">
    <rect class="box" width="260" height="195"/>
    <rect class="head" width="260" height="34"/>
    <text class="title" x="14" y="23">transactions</text>
    <text class="key" x="14" y="58">PK transaction_id</text>
    <text class="text" x="14" y="82">wallet_id logical</text>
    <text class="key" x="14" y="106">FK shift_id nullable</text>
    <text class="text" x="14" y="130">amount, transaction_type</text>
    <text class="text" x="14" y="154">payment_method, status</text>
    <text class="text" x="14" y="178">reference_id VARCHAR</text>
  </g>

  <g class="finance" transform="translate(1340,100)">
    <rect class="box" width="230" height="175"/>
    <rect class="head" width="230" height="34"/>
    <text class="title" x="14" y="23">clearing_settlements</text>
    <text class="key" x="14" y="58">PK settlement_id INT</text>
    <text class="key" x="14" y="82">FK operator_id INT</text>
    <text class="text" x="14" y="106">clearing_date</text>
    <text class="text" x="14" y="130">total / allocated / net</text>
    <text class="text" x="14" y="154">status, processed_at</text>
  </g>

  <g class="finance" transform="translate(1340,620)">
    <rect class="box" width="230" height="230"/>
    <rect class="head" width="230" height="34"/>
    <text class="title" x="14" y="23">withdrawal_requests</text>
    <text class="key" x="14" y="58">PK request_id</text>
    <text class="key" x="14" y="82">FK operator_id INT</text>
    <text class="text" x="14" y="106">wallet_id logical</text>
    <text class="text" x="14" y="130">requested_by logical</text>
    <text class="text" x="14" y="154">amount, bank info</text>
    <text class="text" x="14" y="178">status</text>
    <text class="text" x="14" y="202">reviewed_by logical</text>
  </g>

  <path class="rel" d="M280 155 C310 155, 330 155, 360 155"/>
  <path class="rel" d="M590 155 C625 155, 655 155, 690 155"/>
  <path class="rel" d="M590 205 C650 300, 650 390, 690 420"/>
  <path class="rel" d="M590 210 C650 650, 30 650, 50 735"/>
  <path class="rel" d="M920 155 C970 155, 1000 145, 1050 145"/>
  <path class="rel" d="M920 205 C970 300, 990 385, 1030 425"/>
  <path class="rel" d="M300 440 C320 440, 340 435, 360 435"/>
  <path class="rel" d="M300 450 C480 450, 520 430, 690 430"/>
  <path class="rel" d="M300 475 C580 560, 820 430, 1030 430"/>
  <path class="rel" d="M300 515 C320 620, 35 635, 50 760"/>
  <path class="rel" d="M950 430 C980 430, 1000 430, 1030 430"/>
  <path class="rel" d="M1290 145 C1310 145, 1325 145, 1340 145"/>
  <path class="rel" d="M1290 745 C1310 745, 1325 735, 1340 735"/>
  <path class="rel" d="M1170 220 C1170 390, 1170 500, 1170 650"/>
  <path class="logical" d="M50 345 C20 260, 20 70, 50 55"/>
  <path class="logical" d="M1030 670 C930 610, 890 1010, 730 1050"/>
  <text class="note" x="52" y="1045">Logical auth_db refs: cards.owner_id, cards.created_by, orders.user_id, staff_shifts.staff_id, withdrawal_requests.requested_by/reviewed_by -> accounts.id</text>
  <text class="note" x="52" y="1065">Logical wallet refs: transactions.wallet_id and withdrawal_requests.wallet_id -> wallets.wallet_id</text>
</svg>
